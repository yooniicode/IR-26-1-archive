# Parking Lot Slot Metadata
# 16 slots: 12 general + 4 handicapped
# Occupied: A4, A7, B3, B6
# Layout: 2 rows (A=north, B=south), 8 slots each
# Slot dimensions: 2.8m (width) x 4.5m (depth)
# Lane width: 6.0m (y: -3.0 to 3.0)

parking_lot:
  name: "autonomous_parking_lot"
  dimensions:
    width: 22.4   # x-axis (meters)
    height: 17.0  # y-axis (meters)
  lane:
    y_min: -3.0
    y_max: 3.0
    width: 6.0

# Observation points for the robot
observation_points:
  - id: "obs_1"
    x: -5.0
    y: 0.0
    yaw: 1.5708   # facing north (Row A)
    description: "Left side observation - covers A1~A4, B1~B4"
  - id: "obs_2"
    x: 5.0
    y: 0.0
    yaw: 1.5708   # facing north (Row A)
    description: "Right side observation - covers A5~A8, B5~B8"

# Robot spawn pose
robot_spawn:
  x: -12.0
  y: 0.0
  yaw: 0.0  # facing east (into parking lot)

# Slot definitions
slots:
  # === Row A (North side, y=4.0~8.5) ===
