    type: "handicapped"
    center_x: -9.8
    center_y: 6.25
    yaw: -1.5708
    width: 2.8
    depth: 4.5
    roi:
      x_min: -11.2
      x_max: -8.4
      y_min: 4.0
      y_max: 8.5
    occupied: false

